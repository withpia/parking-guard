<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="파킹가드">
<title>파킹가드 🅿️</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --ok: #00e676;
    --ok-dim: #00391d;
    --danger: #ff1744;
    --danger-dim: #3d0011;
    --warn: #ffab00;
    --text: #f0f0f0;
    --muted: #888;
    --plate-font: 'Courier New', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
  }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--ok); }
  .tab-bar { display: flex; gap: 4px; }
  .tab {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    border: none; cursor: pointer; transition: all .15s;
    background: transparent; color: var(--muted);
  }
  .tab.active { background: var(--surface2); color: var(--text); }

  /* ── Pages ── */
  .page { display: none; flex: 1; flex-direction: column; padding: 20px; }
  .page.active { display: flex; }

  /* ── Camera page ── */
  .cam-wrap {
    position: relative; border-radius: 16px; overflow: hidden;
    background: #000; aspect-ratio: 4/3; width: 100%; max-width: 480px;
    align-self: center; border: 2px solid var(--border);
  }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cam-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .plate-guide {
    width: 72%; height: 22%;
    border: 2px dashed rgba(255,255,255,.4);
    border-radius: 6px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,.35);
  }
  .guide-label {
    position: absolute; bottom: 12px; left: 0; right: 0;
    text-align: center; font-size: 11px; color: rgba(255,255,255,.6);
  }

  #snap-btn {
    align-self: center; margin-top: 16px;
    width: 68px; height: 68px; border-radius: 50%;
    background: var(--text); border: 4px solid var(--surface2);
    cursor: pointer; transition: transform .1s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 3px var(--border);
  }
  #snap-btn:active { transform: scale(.93); }
  #snap-btn svg { width: 28px; height: 28px; }

  canvas { display: none; }

  /* result card */
  #result-card {
    margin-top: 16px; border-radius: 14px; padding: 18px 20px;
    display: none; flex-direction: column; gap: 8px;
    border: 1.5px solid var(--border);
  }
  #result-card.ok { background: var(--ok-dim); border-color: var(--ok); }
  #result-card.danger { background: var(--danger-dim); border-color: var(--danger); }
  #result-card.warn { background: #2a1f00; border-color: var(--warn); }

  .result-status {
    font-size: 22px; font-weight: 800; letter-spacing: .5px;
  }
  #result-card.ok .result-status { color: var(--ok); }
  #result-card.danger .result-status { color: var(--danger); }
  #result-card.warn .result-status { color: var(--warn); }

  .result-plate {
    font-family: var(--plate-font); font-size: 28px; font-weight: 700;
    letter-spacing: 3px; color: var(--text);
    background: rgba(0,0,0,.3); border-radius: 8px;
    padding: 8px 14px; display: inline-block;
  }
  .result-sub { font-size: 13px; color: var(--muted); }

  /* spinner */
  #spinner {
    display: none; align-self: center; margin-top: 16px;
    flex-direction: column; align-items: center; gap: 10px;
  }
  .spin-ring {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--ok);
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin-label { font-size: 13px; color: var(--muted); }

  /* ── Register page ── */
  .section-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 10px;
  }
  .input-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .input-row input {
    flex: 1; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-size: 16px; font-family: var(--plate-font); letter-spacing: 2px;
    outline: none; text-transform: uppercase;
    transition: border-color .15s;
  }
  .input-row input:focus { border-color: var(--ok); }
  .input-row input::placeholder { color: var(--muted); font-family: -apple-system, sans-serif; letter-spacing: 0; text-transform: none; }
  .btn-add {
    background: var(--ok); color: #000; font-weight: 700;
    padding: 0 18px; border-radius: 10px; border: none; cursor: pointer;
    font-size: 14px; white-space: nowrap; transition: opacity .15s;
  }
  .btn-add:active { opacity: .8; }

  .car-list { display: flex; flex-direction: column; gap: 8px; }
  .car-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border-radius: 10px; padding: 12px 14px;
    border: 1px solid var(--border);
  }
  .car-plate {
    font-family: var(--plate-font); font-size: 18px; font-weight: 700;
    letter-spacing: 2px;
  }
  .car-name { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .btn-del {
    background: none; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px; padding: 6px 10px;
    font-size: 12px; cursor: pointer; transition: all .15s;
  }
  .btn-del:hover { border-color: var(--danger); color: var(--danger); }

  .empty-msg {
    text-align: center; color: var(--muted); font-size: 14px;
    padding: 32px 0;
  }

  /* count badge */
  .count-badge {
    background: var(--surface2); color: var(--muted);
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    margin-left: 6px;
  }
  
  /* manual input section */
  .manual-section {
    margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);
  }
  .manual-row { display: flex; gap: 8px; }
  .manual-row input {
    flex: 1; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-size: 16px; font-family: var(--plate-font); letter-spacing: 2px;
    outline: none; text-transform: uppercase;
    transition: border-color .15s;
  }
  .manual-row input:focus { border-color: var(--warn); }
  .btn-check {
    background: var(--warn); color: #000; font-weight: 700;
    padding: 0 18px; border-radius: 10px; border: none; cursor: pointer;
    font-size: 14px; white-space: nowrap; transition: opacity .15s;
  }

  /* install hint */
  .install-hint {
    margin-top: auto; padding-top: 20px;
    font-size: 11px; color: var(--muted); text-align: center; line-height: 1.6;
  }
</style>
</head>
<body>

<header>
  <div class="logo">파킹<span>가드</span></div>
  <div class="tab-bar">
    <button class="tab active" onclick="showPage('cam')">📷 인식</button>
    <button class="tab" onclick="showPage('reg')">📋 등록 <span class="count-badge" id="count-badge">0</span></button>
  </div>
</header>

<!-- 카메라 페이지 -->
<div class="page active" id="page-cam">
  <div class="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="cam-overlay">
      <div class="plate-guide"></div>
    </div>
    <div class="guide-label">번호판을 가이드 안에 맞추세요</div>
  </div>
  <canvas id="canvas"></canvas>
  <button id="snap-btn" onclick="capture()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <path d="M1 12s3-7 11-7 11 7 11 7-3 7-11 7-11-7-11-7z"/>
    </svg>
  </button>

  <div id="spinner">
    <div class="spin-ring"></div>
    <div class="spin-label">번호판 읽는 중…</div>
  </div>

  <div id="result-card">
    <div class="result-plate" id="result-plate">—</div>
    <div class="result-status" id="result-status">—</div>
    <div class="result-sub" id="result-sub"></div>
  </div>

  <!-- 수동 입력 -->
  <div class="manual-section">
    <div class="section-title">수동 확인</div>
    <div class="manual-row">
      <input id="manual-input" type="text" placeholder="12가 3456" maxlength="10"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter') manualCheck()">
      <button class="btn-check" onclick="manualCheck()">확인</button>
    </div>
  </div>

  <div class="install-hint">홈 화면에 추가하면 앱처럼 사용할 수 있어요<br>Safari → 공유 → 홈 화면에 추가</div>
</div>

<!-- 등록 페이지 -->
<div class="page" id="page-reg">
  <div class="section-title">차량 등록</div>
  <div class="input-row">
    <input id="plate-input" type="text" placeholder="번호판 (예: 12가 3456)" maxlength="10"
      oninput="this.value=this.value.toUpperCase()">
    <button class="btn-add" onclick="addCar()">+ 등록</button>
  </div>

  <div class="section-title">등록 차량 목록</div>
  <div class="car-list" id="car-list"></div>
</div>

<script>
// ── 데이터 ──
const VISION_API_KEY = 'AIzaSyCHJsStODkPqTiHlNPgr84kTnOV7NBv_EY';
const STORE_KEY = 'pg_cars_v1';
let cars = [];
try { cars = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch(e) {}

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(cars));
  renderList();
  updateBadge();
}

function normalize(s) {
  // 공백, 하이픈 제거 후 소문자
  return s.replace(/[\s\-]/g, '').toLowerCase();
}

function isRegistered(plateText) {
  const n = normalize(plateText);
  return cars.find(c => normalize(c.plate) === n);
}

// ── UI ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  event.target.classList.add('active');
  if (id === 'cam') startCamera();
}

function updateBadge() {
  document.getElementById('count-badge').textContent = cars.length;
}

function renderList() {
  const el = document.getElementById('car-list');
  if (!cars.length) {
    el.innerHTML = '<div class="empty-msg">등록된 차량이 없습니다</div>';
    return;
  }
  el.innerHTML = cars.map((c, i) => `
    <div class="car-item">
      <div>
        <div class="car-plate">${c.plate}</div>
        ${c.note ? `<div class="car-name">${c.note}</div>` : ''}
      </div>
      <button class="btn-del" onclick="delCar(${i})">삭제</button>
    </div>
  `).join('');
}

function addCar() {
  const inp = document.getElementById('plate-input');
  const val = inp.value.trim();
  if (!val) return;
  if (isRegistered(val)) {
    alert('이미 등록된 번호입니다.');
    return;
  }
  cars.push({ plate: val, note: '', ts: Date.now() });
  save();
  inp.value = '';
  inp.focus();
}

function delCar(i) {
  if (!confirm(`"${cars[i].plate}" 삭제할까요?`)) return;
  cars.splice(i, 1);
  save();
}

// ── 카메라 ──
let stream = null;
async function startCamera() {
  if (stream) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    document.getElementById('video').srcObject = stream;
  } catch (err) {
    alert('카메라 접근 권한이 필요합니다.\n브라우저 설정에서 카메라를 허용해주세요.');
  }
}

async function capture() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);

  showResult(null);
  document.getElementById('spinner').style.display = 'flex';
  document.getElementById('snap-btn').disabled = true;

  try {
    const base64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
    const res = await fetch(
      `https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{
            image: { content: base64 },
            features: [{ type: 'TEXT_DETECTION', maxResults: 1 }]
          }]
        })
      }
    );
    const data = await res.json();
    const text = data.responses?.[0]?.fullTextAnnotation?.text || '';
    const plate = extractPlate(text);
    showResult(plate);
  } catch (e) {
    showResult(null, true);
  } finally {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('snap-btn').disabled = false;
  }
}

// 한국 번호판 패턴 추출
function extractPlate(rawText) {
  const cleaned = rawText.replace(/\n/g, ' ').replace(/[^가-힣A-Z0-9\s]/gi, ' ');
  // 패턴: 숫자2~3 + 한글1 + 숫자4  또는  한글2 + 숫자4
  const patterns = [
    /\d{2,3}\s*[가-힣]\s*\d{4}/,
    /[가-힣]{2}\s*\d{4}/,
  ];
  for (const p of patterns) {
    const m = cleaned.match(p);
    if (m) return m[0].replace(/\s+/g, ' ').trim();
  }
  // 패턴 없으면 OCR 원문 그대로 리턴 (수동 확인용)
  const fallback = cleaned.replace(/\s+/g, ' ').trim().slice(0, 20);
  return fallback || null;
}

function showResult(plate, error = false) {
  const card = document.getElementById('result-card');
  const platEl = document.getElementById('result-plate');
  const statEl = document.getElementById('result-status');
  const subEl = document.getElementById('result-sub');

  if (!plate || error) {
    if (error) {
      card.className = 'warn';
      card.style.display = 'flex';
      platEl.textContent = '—';
      statEl.textContent = '인식 실패';
      subEl.textContent = '다시 찍거나 아래에서 직접 입력해보세요';
    }
    return;
  }

  const found = isRegistered(plate);
  card.style.display = 'flex';
  platEl.textContent = plate;

  if (found) {
    card.className = 'ok';
    statEl.textContent = '✅ 등록 차량';
    subEl.textContent = found.note || '입주민 차량입니다';
  } else {
    card.className = 'danger';
    statEl.textContent = '🚫 미등록 차량';
    subEl.textContent = '등록되지 않은 외부 차량입니다';
  }
}

function manualCheck() {
  const val = document.getElementById('manual-input').value.trim();
  if (!val) return;
  showResult(val);
  document.getElementById('manual-input').value = '';
}

// 초기화
renderList();
updateBadge();
startCamera();
</script>
</body>
</html>
